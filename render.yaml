services:
  - type: web
    name: zorvyn
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/zorvyn-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zorvyn-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: zorvyn-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: zorvyn-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: zorvyn-db
    plan: free
